<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Airport SVG Mapping</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #f2f2f2;
      font-family: Arial, sans-serif;
    }

    .map-wrapper {
      position: relative;
      width: 1200px;   /* change if needed */
      margin: 0 auto;
      border: 1px solid #ccc;
      background: white;
    }

    .map-image {
      display: block;
      width: 100%;
      height: auto;
    }

    .map-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .region {
      fill: rgba(255, 255, 255, 0.35);
      stroke: black;
      stroke-width: 2;
      cursor: pointer;
      transition: fill 0.2s ease;
    }

    .region:hover {
      fill: rgba(100, 150, 255, 0.4);
    }

    .label {
      font-size: 22px;
      font-weight: bold;
      fill: black;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="map-wrapper">
    <img src="UpScaled.png" alt="Airport map" class="map-image" />

    <!-- Match the viewBox to your image's pixel size -->
    <svg class="map-overlay" viewBox="0 0 1600 742" preserveAspectRatio="xMidYMid meet">

  <script>
  const svg = document.querySelector(".map-overlay");
  const points = [];

  document.querySelectorAll(".region").forEach(region => {
    region.addEventListener("click", () => {
      console.log("Clicked:", region.id);
      alert("You clicked " + region.id);
    });
  });

  svg.addEventListener("mousemove", (e) => {
    const rect = svg.getBoundingClientRect();
    const vb = svg.viewBox.baseVal;

    const x = ((e.clientX - rect.left) / rect.width) * vb.width + vb.x;
    const y = ((e.clientY - rect.top) / rect.height) * vb.height + vb.y;

    // console.log("SVG Mouse:", Math.round(x), Math.round(y));
  });

  svg.addEventListener("click", (e) => {
    const rect = svg.getBoundingClientRect();
    const vb = svg.viewBox.baseVal;

    const x = ((e.clientX - rect.left) / rect.width) * vb.width + vb.x;
    const y = ((e.clientY - rect.top) / rect.height) * vb.height + vb.y;

    const point = {
      x: Math.round(x),
      y: Math.round(y)
    };

    points.push(point);
    console.log(points);
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      console.log(points.map(p => `${p.x},${p.y}`).join(" "));
    }
  });
</script>
