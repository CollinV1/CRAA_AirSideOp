.upload-card {
  max-width: 760px;
  margin: 30px auto;
  padding: 28px;
  background: #223554;
  border-radius: 20px;
}

.csv-drop-zone {
  border: 2px dashed rgba(160, 180, 220, 0.6);
  border-radius: 18px;
  padding: 36px 24px;
  cursor: pointer;
  transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
}

.csv-drop-zone:hover {
  background: rgba(255, 255, 255, 0.03);
}

.csv-drop-zone.dragover {
  background: rgba(255, 255, 255, 0.06);
  border-color: #9fc2ff;
  transform: scale(1.01);
}

.upload-content {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
  text-align: left;
}

.upload-icon {
  font-size: 42px;
  color: #9fb3d9;
  line-height: 1;
}

.upload-title {
  font-size: 18px;
  font-weight: 700;
  color: white;
}

.upload-subtitle {
  margin-top: 6px;
  font-size: 15px;
  color: #a9bad9;
}

    .region {
      fill: rgba(255, 255, 255, 0.35);
      stroke: none;
      stroke-width: 2;
      cursor: pointer;
      transition: fill 0.2s ease;
      transform-box: fill-box;
      transform-origin: center;
    }

    .region:hover {
      fill: rgba(100, 150, 255, 0.4);

  <script>
  const mapBtn = document.getElementById("mapBtn");
  const dashboardBtn = document.getElementById("dashboardBtn");

  const mapView = document.getElementById("mapView");
  const dashboardView = document.getElementById("dashboardView");

  mapBtn.addEventListener("click", () => {
    mapView.classList.add("active");
    dashboardView.classList.remove("active");

    mapBtn.classList.add("active");
    dashboardBtn.classList.remove("active");
  });

  dashboardBtn.addEventListener("click", () => {
    dashboardView.classList.add("active");
    mapView.classList.remove("active");

    dashboardBtn.classList.add("active");
    mapBtn.classList.remove("active");
  });
  
  const svg = document.querySelector(".map-overlay");
  const points = [];

  document.querySelectorAll(".region").forEach(region => {
    region.addEventListener("click", () => {
      console.log("Clicked:", region.id);
      alert("You clicked " + region.id);
    });
  });

  svg.addEventListener("mousemove", (e) => {
    const rect = svg.getBoundingClientRect();
    const vb = svg.viewBox.baseVal;

    const x = ((e.clientX - rect.left) / rect.width) * vb.width + vb.x;
    const y = ((e.clientY - rect.top) / rect.height) * vb.height + vb.y;

    // console.log("SVG Mouse:", Math.round(x), Math.round(y));
  });

  svg.addEventListener("click", (e) => {
    const rect = svg.getBoundingClientRect();
    const vb = svg.viewBox.baseVal;

    const x = ((e.clientX - rect.left) / rect.width) * vb.width + vb.x;
    const y = ((e.clientY - rect.top) / rect.height) * vb.height + vb.y;

    const point = {
      x: Math.round(x),
      y: Math.round(y)
    };

    points.push(point);
    console.log(points);
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      console.log(points.map(p => `${p.x},${p.y}`).join(" "));
    }
  });
  function randomGateColor() {
    const regions = document.querySelectorAll(".region");

    regions.forEach(region => {
      const value = Math.random() < 0.5 ? 0 : 1;
      if (value === 0) {
        region.style.fill = "rgba(255, 0, 0, 0.4)"; // red
      } else {
        region.style.fill = "rgba(0, 200, 0, 0.4)"; // green
      }
    });
  }

  let uploadedCSV = null;

const csvDropZone = document.getElementById("csvDropZone");
const csvFileInput = document.getElementById("csvFileInput");

csvDropZone.addEventListener("click", () => {
  csvFileInput.click();
});

csvFileInput.addEventListener("change", (event) => {
  const file = event.target.files[0];
  handleCSVFile(file);
});

csvDropZone.addEventListener("dragover", (event) => {
  event.preventDefault();
  csvDropZone.classList.add("dragover");
});

csvDropZone.addEventListener("dragleave", () => {
  csvDropZone.classList.remove("dragover");
});

csvDropZone.addEventListener("drop", (event) => {
  event.preventDefault();
  csvDropZone.classList.remove("dragover");

  const file = event.dataTransfer.files[0];
  handleCSVFile(file);
});

function handleCSVFile(file) {
  if (!file) return;

  const isCSV =
    file.name.toLowerCase().endsWith(".csv") ||
    file.type === "text/csv" ||
    file.type === "application/vnd.ms-excel";

  if (!isCSV) {
    alert("Please upload a CSV file.");
    return;
  }

  uploadedCSV = file;

  console.log("Stored CSV file:", uploadedCSV);
  console.log("File name:", uploadedCSV.name);
  console.log("File size:", uploadedCSV.size);

  const title = csvDropZone.querySelector(".upload-title");
  const subtitle = csvDropZone.querySelector(".upload-subtitle");

  title.textContent = `Loaded: ${uploadedCSV.name}`;
  subtitle.textContent = "CSV stored successfully";
}

const monthSelect = document.getElementById("monthSelect");
const daySelect = document.getElementById("daySelect");
const yearSelect = document.getElementById("yearSelect");
const timeSelect = document.getElementById("timeSelect");

const selectedDateText = document.getElementById("selectedDateText");
const selectedTimeText = document.getElementById("selectedTimeText");

function populateYears() {
  for (let year = 2024; year <= 2035; year++) {
    const option = document.createElement("option");
    option.value = year;
    option.textContent = year;
    if (year === 2026) option.selected = true;
    yearSelect.appendChild(option);
  }
}

function populateTimes() {
  for (let hour = 0; hour < 24; hour++) {
    const option = document.createElement("option");
    const value = String(hour).padStart(2, "0") + ":00";
    option.value = value;
    option.textContent = value;

    if (value === "14:00") option.selected = true;

    timeSelect.appendChild(option);
  }
}
//This entire func is more or less a placeholder, just to get the calendar working for now
function populateDays() {
// Get the selected month/year from dropdown and convert it to a number

  const month = parseInt(monthSelect.value, 10);
  const year = parseInt(yearSelect.value, 10);
// Create a Date object for the "0th" day of the next month
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const currentDay = daySelect.value;

// Loop from day 1 up to the number of days in the selected month
  for (let day = 1; day <= daysInMonth; day++) {
    const option = document.createElement("option");
    option.value = day;
    option.textContent = day;

    if (parseInt(currentDay, 10) === day) {
      option.selected = true;
    }

    daySelect.appendChild(option);
  }

  if (!daySelect.value) {
    daySelect.value = "1";
  }
}

function formatDateDisplay(date) {
  const monthsShort = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
  return `${monthsShort[date.getMonth()]} ${date.getDate()}, ${date.getFullYear()}`;
}

function formatTimeDisplay(time24) {
  let [hours, minutes] = time24.split(":").map(Number);
  const suffix = hours >= 12 ? "PM" : "AM";

  hours = hours % 12;
  if (hours === 0) hours = 12;

  return `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")} ${suffix}`;
}

function updateDateDisplay() {
  const year = parseInt(yearSelect.value, 10);
  const month = parseInt(monthSelect.value, 10);
  const day = parseInt(daySelect.value, 10);
  const time = timeSelect.value;

  const selectedDate = new Date(year, month, day);

  selectedDateText.textContent = formatDateDisplay(selectedDate);
  selectedTimeText.textContent = formatTimeDisplay(time);
}

populateYears();
populateTimes();
populateDays();
updateDateDisplay();

monthSelect.addEventListener("change", () => {
  populateDays();
  updateDateDisplay();
});

daySelect.addEventListener("change", updateDateDisplay);
yearSelect.addEventListener("change", () => {
  populateDays();
  updateDateDisplay();
});
timeSelect.addEventListener("change", updateDateDisplay);
  randomGateColor();
</script>
